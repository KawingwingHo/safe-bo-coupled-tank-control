<svg xmlns="http://www.w3.org/2000/svg" width="2379" height="1280" viewBox="0 0 2379 1280" role="img" aria-labelledby="title desc">
  <title id="title">安全贝叶斯优化多回路 PI 自动整定架构</title>
  <desc id="desc">展示耦合双水箱项目中的在线控制闭环、离线安全贝叶斯优化和部署资格门之间的关系。</desc>
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .title { font-family: SimHei, "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; font-size: 56px; font-weight: 700; fill: #172033; }
      .section-title { font-family: SimHei, "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; font-size: 30px; font-weight: 700; fill: #172033; }
      .label { font-family: SimHei, "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; font-size: 34px; font-weight: 700; fill: #172033; }
      .sub { font-family: SimHei, "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; font-size: 24px; font-weight: 500; fill: #5c6b82; }
      .note { font-family: SimHei, "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; font-size: 31px; font-weight: 700; fill: #6b7280; }
      .latin { font-family: "Times New Roman", Times, serif; }
      .panel { fill: #f8fbff; stroke-width: 2.5; }
      .card { fill: #ffffff; stroke-width: 4; rx: 22; ry: 22; filter: url(#shadow); }
      .soft-card { fill: #ffffff; stroke-width: 3.5; rx: 20; ry: 20; }
      .arrow { fill: none; stroke: #44546a; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-dark); }
      .arrow-blue { fill: none; stroke: #2563eb; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-blue); }
      .arrow-purple { fill: none; stroke: #7c3aed; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-purple); }
      .arrow-green { fill: none; stroke: #059669; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-green); }
      .feedback { fill: none; stroke: #64748b; stroke-width: 4.5; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-gray); }
      .chip { font-family: "Times New Roman", Times, serif; font-size: 24px; font-weight: 700; fill: #ffffff; }
    </style>
    <filter id="shadow" x="-8%" y="-18%" width="116%" height="136%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow-dark" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
      <path d="M1,1 L11,6 L1,11 Z" fill="#44546a"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
      <path d="M1,1 L11,6 L1,11 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
      <path d="M1,1 L11,6 L1,11 Z" fill="#7c3aed"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
      <path d="M1,1 L11,6 L1,11 Z" fill="#059669"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
      <path d="M1,1 L11,6 L1,11 Z" fill="#64748b"/>
    </marker>
  </defs>

  <rect class="bg" width="2379" height="1280"/>
  <text class="title" x="1189.5" y="98" text-anchor="middle">安全贝叶斯优化多回路 <tspan class="latin">PI</tspan> 自动整定架构</text>

  <rect class="panel" x="110" y="185" width="2159" height="430" rx="34" stroke="#dbeafe"/>
  <rect class="panel" x="110" y="675" width="2159" height="330" rx="34" stroke="#ede9fe"/>
  <rect class="panel" x="110" y="1045" width="2159" height="120" rx="34" stroke="#dcfce7"/>

  <text class="section-title" x="150" y="242">在线控制闭环</text>
  <text class="section-title" x="150" y="732">离线安全优化</text>
  <text class="section-title" x="150" y="1122">部署约束结论</text>

  <g id="online-loop">
    <rect class="card" x="170" y="330" width="330" height="130" stroke="#334155"/>
    <text class="label" x="335" y="408" text-anchor="middle">目标液位</text>

    <rect class="card" x="635" y="330" width="330" height="130" stroke="#2563eb"/>
    <text class="label" x="800" y="389" text-anchor="middle">双回路 <tspan class="latin">PI</tspan></text>
    <text class="sub" x="800" y="425" text-anchor="middle">四个待整定参数</text>

    <rect class="card" x="1100" y="330" width="330" height="130" stroke="#2563eb"/>
    <text class="label" x="1265" y="389" text-anchor="middle">泵与执行器滞后</text>
    <text class="sub" x="1265" y="425" text-anchor="middle">限幅、惯性、饱和风险</text>

    <rect class="card" x="1565" y="330" width="330" height="130" stroke="#0284c7"/>
    <text class="label" x="1730" y="389" text-anchor="middle">耦合双水箱</text>
    <text class="sub" x="1730" y="425" text-anchor="middle">非线性耦合液位对象</text>

    <rect class="card" x="1565" y="520" width="330" height="130" stroke="#0284c7"/>
    <text class="label" x="1730" y="579" text-anchor="middle">液位与泵状态</text>
    <text class="sub" x="1730" y="615" text-anchor="middle">传感器反馈与安全评价</text>

    <path class="arrow" d="M500 395 H607"/>
    <path class="arrow" d="M965 395 H1072"/>
    <path class="arrow" d="M1430 395 H1537"/>
    <path class="arrow" d="M1730 460 V492"/>
    <path class="feedback" d="M1565 585 C1340 585 1110 508 924 426"/>
    <text class="sub" x="1210" y="548" text-anchor="middle">传感器反馈</text>
  </g>

  <g id="safe-bo-loop">
    <rect class="card" x="170" y="805" width="330" height="130" stroke="#7c3aed"/>
    <text class="label" x="335" y="864" text-anchor="middle">性能 <tspan class="latin">GP</tspan></text>
    <text class="sub" x="335" y="900" text-anchor="middle">预测跟踪质量</text>

    <rect class="card" x="635" y="805" width="330" height="130" stroke="#7c3aed"/>
    <text class="label" x="800" y="864" text-anchor="middle">安全 <tspan class="latin">GP + LCB</tspan></text>
    <text class="sub" x="800" y="900" text-anchor="middle">在线试验风险下界</text>

    <rect class="card" x="1100" y="805" width="330" height="130" stroke="#059669"/>
    <text class="label" x="1265" y="864" text-anchor="middle"><tspan class="latin">0.18</tspan> 信任步长</text>
    <text class="sub" x="1265" y="900" text-anchor="middle">限制相邻试验跳变</text>

    <rect class="card" x="1565" y="805" width="330" height="130" stroke="#059669"/>
    <text class="label" x="1730" y="864" text-anchor="middle"><tspan class="latin">5</tspan> 工况资格门</text>
    <text class="sub" x="1730" y="900" text-anchor="middle">部署前离线复核</text>

    <path class="arrow-purple" d="M500 870 H607"/>
    <path class="arrow-purple" d="M965 870 H1072"/>
    <path class="arrow-green" d="M1430 870 H1537"/>
    <path class="arrow-purple" d="M800 805 V488"/>
    <text class="sub" x="847" y="652" transform="rotate(-90 847 652)" fill="#7c3aed">候选 <tspan class="latin">PI</tspan> 参数</text>
    <path class="arrow-green" d="M1730 805 V678"/>
  </g>

  <g id="risk-separation">
    <rect x="505" y="1078" width="496" height="54" rx="27" fill="#7c3aed"/>
    <text class="chip" x="753" y="1114" text-anchor="middle">在线试验风险：由安全 GP + LCB 约束</text>
    <rect x="1048" y="1078" width="578" height="54" rx="27" fill="#059669"/>
    <text class="chip" x="1337" y="1114" text-anchor="middle">离线部署风险：由 5 工况资格门复核</text>
    <text class="note" x="1189.5" y="1220" text-anchor="middle">两类风险不能相互替代：调参过程要安全，最终控制器也必须通过部署资格门</text>
  </g>
</svg>
